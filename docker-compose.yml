services:
  postgres:
    image: postgres:16
    container_name: check_mate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-check_mate_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - check_mate_pgdata:/var/lib/postgresql/data
      - .:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  check_mate_pgdata:

project: Check_Mate
as_of: 2026-03-25
stage_assessment: foundation_narrow_alpha
core_verdict:
  strongest_areas:
    - exact_core_parser_normalizer_foundation
    - tournament_economics_split
    - ambiguity_safe_materialization_policy
    - sidepot_elimination_foundation
  weakest_areas:
    - boundary_transition_logic
    - ko_event_vs_ko_money_semantics
    - big_ko_decoder_model
    - missing_formal_mbr_stats_spec
    - incomplete_mbr_stats_migration
phases:
  - phase_id: F0
    title: Freeze semantics and contracts
    tasks:
      - id: F0-T1
        priority: P0
        title: Formal spec for all MBR stats
        goal: Make every legacy stat implementation unambiguous before coding.
        deliverables:
          - docs/stat_catalog/mbr_stats_spec_v1.yml
        required_fields:
          - legacy_module_id
          - new_stat_keys
          - formal_formula
          - numerator_definition
          - denominator_definition
          - units
          - grain
          - exactness_class
          - source_dependencies
          - partial_coverage_behavior
          - fixture_expectations
        acceptance_checklist:
          - Every legacy module has a formal formula.
          - Every stat has exactness_class.
          - Every stat has coverage contract.
          - Legacy-to-new mapping is explicit.
          - No prose-only stat definitions remain.
      - id: F0-T2
        priority: P0
        title: KO semantics glossary
        goal: Separate event terminology from money terminology.
        deliverables:
          - docs/architecture/ko_semantics_glossary.md
        acceptance_checklist:
          - Terms ko_event and ko_money are explicitly separated.
          - Terms split_ko, sidepot_ko, big_ko, mystery_money_total are defined.
          - No ambiguous domain term remains undocumented.
  - phase_id: F1
    title: Repair stage and boundary core
    tasks:
      - id: F1-T1
        priority: P0
        title: Replace last-5-max boundary heuristic
        goal: Remove hard-coded boundary selection and support uncertain boundary resolution.
        deliverables:
          - rewritten boundary resolver
          - new tests for 2-max/3-max/4-max/5-max boundary candidates
        acceptance_checklist:
          - Code no longer searches for last 5-max hand as a rule.
          - Boundary can be exact or uncertain.
          - Boundary min/ev/max are not identical unless exact.
          - Tests cover multiple candidate last-rush scenarios.
      - id: F1-T2
        priority: P0
        title: Build tournament-level FT helper layer
        goal: Stabilize FT and boundary signals at tournament grain.
        deliverables:
          - derived tournament helper table or equivalent view
        required_fields:
          - reached_ft_exact
          - first_ft_hand_id
          - first_ft_table_size
          - ft_started_incomplete
          - deepest_ft_size_reached
          - hero_ft_entry_stack_chips
          - hero_ft_entry_stack_bb
          - boundary_resolution_state
        acceptance_checklist:
          - One deterministic FT helper record exists per tournament.
          - first_ft_hand_id is test-covered.
          - incomplete FT is formally derived.
      - id: F1-T3
        priority: P0
        title: Add formal stage predicates
        goal: Avoid using coarse ft_stage_bucket as the primary substrate.
        deliverables:
          - stage predicate layer
        required_predicates:
          - is_ft_hand
          - ft_players_remaining_exact
          - is_stage_2
          - is_stage_3_4
          - is_stage_4_5
          - is_stage_5_6
          - is_stage_6_9
          - is_boundary_hand
        acceptance_checklist:
          - Legacy stage modules are expressible without hacks.
          - Stage 4-5 and 6-9 work exactly.
          - Synthetic fixtures cover all stage predicates.
  - phase_id: F2
    title: Separate KO event model from KO money model
    tasks:
      - id: F2-T1
        priority: P0
        title: Split event-count entities from money-share entities
        goal: Prevent direct reuse of pot share as bounty money share.
        deliverables:
          - renamed KO event features
          - separate money-share state fields
        acceptance_checklist:
          - Event and money semantics use different fields.
          - No money stat consumes raw pot chip share directly.
          - Existing count features are renamed to *_event_count where appropriate.
      - id: F2-T2
        priority: P0
        title: Formalize split bounty rounding rules
        goal: Support real split-bounty cases including ugly cent divisions.
        deliverables:
          - split bounty policy document
          - test fixtures for 2-way and 3-way splits
        acceptance_checklist:
          - Rounding policy is documented.
          - 2-way and 3-way split tests exist.
          - Valid cases do not become infeasible only due to naive cent divisibility.
  - phase_id: F3
    title: Rebuild Big KO engine
    tasks:
      - id: F3-T1
        priority: P0
        title: Convert Big KO decoder into weighted posterior decoder
        goal: Rank solutions probabilistically, not only by feasibility.
        deliverables:
          - updated decoder using envelope frequencies
          - explanation/debug surface
        acceptance_checklist:
          - Frequency weights affect ranking.
          - Exact, ambiguous, and infeasible cases are distinguished.
          - Expected/min/max outputs are available.
          - Tests cover 1-way, 2-way, 3-way, odd-cent cases.
      - id: F3-T2
        priority: P0
        title: Separate exact tournament mystery totals from inferred Big KO outputs
        goal: Prevent users and code from confusing exact totals with inferred envelope allocations.
        deliverables:
          - separate stat families and metadata
        acceptance_checklist:
          - Tournament mystery total remains exact.
          - Big KO outputs are marked inferred/posterior.
          - API cannot mix the two silently.
  - phase_id: F4
    title: Ship the first honest stat tranche
    tasks:
      - id: F4-T1
        priority: P0
        title: Implement stats already supported by current data
        goal: Deliver a clean first tranche without waiting for full legacy migration.
        target_stats:
          - roi
          - avg_finish_place
          - itm_percent
          - winnings_from_itm
          - winnings_from_ko_total
          - final_table_reach_percent
          - avg_finish_place_ft
          - avg_finish_place_no_ft
          - roi_on_ft
          - total_ko_event_count
          - avg_ko_event_per_tournament
          - incomplete_ft_percent
          - avg_ft_initial_stack_chips
          - avg_ft_initial_stack_bb
        acceptance_checklist:
          - Every stat is in the registry.
          - Every stat has regression tests.
          - Every stat exposes exactness and coverage metadata.
          - No misleading names remain.
      - id: F4-T2
        priority: P0
        title: Add stat metadata surface
        goal: Make every stat self-describing.
        required_output_fields:
          - stat_key
          - value
          - units
          - exactness_class
          - coverage_class
          - sample_size
          - denominator_count
          - blocked_reason
        acceptance_checklist:
          - UI/API can distinguish exact, limited, estimated, and blocked stats.
          - Stat outputs are interpretable without reading code.
  - phase_id: F5
    title: Add stage-aware KO and FT metrics
    tasks:
      - id: F5-T1
        priority: P1
        title: Implement stage-aware KO stats
        target_stats:
          - ko_stage_2_3
          - ko_stage_3_4
          - ko_stage_4_5
          - ko_stage_5_6
          - ko_stage_6_9
          - pre_ft_ko
          - early_ft_ko
          - early_ft_bust
        acceptance_checklist:
          - Stats use formal stage predicates.
          - Boundary ambiguity is handled explicitly.
          - Synthetic tests cover all stage boundaries.
      - id: F5-T2
        priority: P1
        title: Implement FT conversion metrics
        acceptance_checklist:
          - Conversion formulas are documented.
          - incomplete FT handling is correct.
          - No-coverage tournaments are handled explicitly.
  - phase_id: F6
    title: Add richer combat and KO attempt substrate
    tasks:
      - id: F6-T1
        priority: P1
        title: Define and implement KO attempt model
        goal: Enable richer aggression and conversion metrics.
        acceptance_checklist:
          - KO attempt formula is frozen before coding.
          - Derived attempt layer exists.
          - Multiway success/failure fixtures exist.
  - phase_id: F7
    title: Clean up parser and feature model
    tasks:
      - id: F7-T1
        priority: P1
        title: Remove parser-model drift
        acceptance_checklist:
          - Every enum variant is either parsed or removed.
          - Missing action types have fixture tests.
      - id: F7-T2
        priority: P1
        title: Structure summary seat-result lines
        acceptance_checklist:
          - Summary seat results are available structurally.
          - Cross-checks against tournament result data are possible.
      - id: F7-T3
        priority: P1
        title: Remove ft_table_size=0 sentinel
        acceptance_checklist:
          - Non-applicable rows use NULL or explicit applicability semantics.
          - Aggregations cannot be poisoned by zeros.
      - id: F7-T4
        priority: P1
        title: Normalize naming of stats and features
        acceptance_checklist:
          - Event-count metrics are named as event-count metrics.
          - Legacy aliases are explicit and documented.
  - phase_id: F8
    title: Performance and product integration
    tasks:
      - id: F8-T1
        priority: P2
        title: Move from full refresh to incremental materialization
        acceptance_checklist:
          - Full and incremental outputs are identical.
          - Backfill and incremental modes both exist.
      - id: F8-T2
        priority: P2
        title: Build API and UI contract for stat outputs
        acceptance_checklist:
          - UI receives exactness and coverage metadata.
          - UI can show blocked and ambiguous states correctly.

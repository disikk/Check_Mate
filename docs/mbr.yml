problems:
- id: CM-P0-01
  priority: P0
  title: KO-credit semantics в side-pot кейсах, вероятно, противоречит официальному правилу GG
  evidence:
  - '`tracker_parser_core/src/normalizer.rs:403-490` — `build_elimination()` берёт union всех `resolved_by_pot_nos`, победителей
    и объёмы по всем pot''ам busted player.'
  - '`mbr_stats_runtime/src/queries.rs:369-518, 720-747` — downstream count/money stats читают `hero_involved` и `hero_share_fraction`
    из `derived.hand_eliminations` как источник exact KO-credit.'
  - 'Официальное правило GG: если chips busted player есть в side pots, bounty делится только между winners последнего side
    pot.'
  impact: Риск загрязнения `total_ko_event_count`, `avg_ko_event_per_tournament`, `early_ft_ko_*`, всех `ko_stage_*` event/money
    метрик, `ft_stack_conversion*`, `pre_ft_ko_count`, `big_ko_*`, `ko_contribution_adjusted_percent`, `ko_luck_money_delta`,
    `roi_adj_pct`.
- id: CM-P0-02
  priority: P0
  title: '`pre_ft_chipev` имеет явный bias bug на отсутствующем snapshot'
  evidence:
  - '`mbr_stats_runtime/src/queries.rs:797-800` — `COALESCE(pre_ft_snapshot.hero_final_stack, 1000::bigint) - 1000::bigint`.'
  impact: 'Искажается `pre_ft_chipev`: турниры без exact pre-FT snapshot превращаются в искусственный нулевой delta вместо
    исключения из denominator.'
- id: CM-P1-03
  priority: P1
  title: Attempt-based метрики сейчас опираются на heuristic query, а не на доказанный exact event model
  evidence:
  - '`mbr_stats_runtime/src/queries.rs:542-575` — attempt определяется через target all-in + shared pot eligibility + hero
    starting_stack >= target starting_stack.'
  impact: Под риском `avg_ko_attempts_per_ft`, `ko_attempts_success_rate`, `ko_stage_*_attempts_per_tournament`, `ft_stack_conversion_*_attempts`.
- id: CM-P1-04
  priority: P1
  title: Stage/helper/pre-FT ordering опирается на raw local timestamp strings и secondary sort по external ids
  evidence:
  - '`parser_worker/src/local_import.rs:1700-1704`, `1857-1860` — boundary/FT helper сортируют по строковым local timestamps.'
  - '`mbr_stats_runtime/src/queries.rs:433-437`, `658-662`, `683-686`, `827-830` — deep FT, stage entries и pre-FT snapshot
    используют ту же ordering strategy.'
  impact: Условный риск для всех FT/deep-FT/stage/pre-FT метрик вне текущего committed scope.
- id: CM-P1-05
  priority: P1
  title: FT detection жёстко захардкожен как `max_players == 9`
  evidence:
  - '`parser_worker/src/local_import.rs:1706`, `1759-1765`.'
  - Для текущего GG MBR это выглядит совместимым с официальными правилами, но не должно жить как безымянная магическая константа
    по коду.
  impact: Риск тихого drift при future format changes / historical variants.
- id: CM-P1-06
  priority: P1
  title: Документация и инвентарь отстают от реального кода
  evidence:
  - '`README.md` описывает runtime stat layer как очень ранний seed-safe slice.'
  - '`docs/stat_catalog/mbr_stats_inventory.yml` помечает все 31 модуля как `inventory_only`.'
  - Frozen spec и runtime code уже содержат 31 mapped module / 60 keys.
  impact: Высокий риск неверных решений для следующего разработчика или код-агента.
- id: CM-P1-07
  priority: P1
  title: Нет жёсткого end-to-end golden gate на полный canonical snapshot
  evidence:
  - '`mbr_stats_runtime/src/queries.rs` содержит хорошие formula tests, но не заменяет import→DB→query golden proof на полный
    60-key snapshot.'
  - '`docs/STATUS_ASSESSMENT.md` прямо говорит, что extended real corpus за пределами committed pack пока не доказан runtime-исполнением.'
  impact: Риск тихих регрессий при правках KO semantics, stage ordering и helper logic.
phases:
- phase_id: F0
  goal: Фиксация истины и автоматических контрактов
  tasks:
  - phase_id: F0
    task_id: F0-T1
    priority: P0
    title: 'Добавить автоматическую проверку parity: frozen spec ↔ runtime keys'
    why: Сейчас статический аудит показывает полное совпадение 31 модулей / 60 ключей, но это не зафиксировано в CI и может
      сломаться тихо.
    files:
    - backend/crates/mbr_stats_runtime/tests/spec_parity.rs
    - docs/stat_catalog/mbr_stats_spec_v1.yml
    - backend/crates/mbr_stats_runtime/src/models.rs
    - backend/crates/mbr_stats_runtime/src/queries.rs
    steps:
    - Прочитать `docs/stat_catalog/mbr_stats_spec_v1.yml` в тесте и извлечь полный список `new_stat_keys`.
    - Построить runtime-список канонических ключей из seed snapshot + canonical snapshot + Big KO bucket keys.
    - Падать тестом при любом missing/extra key, дубликате ключа или изменении числа модулей/ключей без явного обновления
      spec.
    - Добавить этот тест в обязательный backend check.
    acceptance:
    - CI падает при любом расхождении между frozen spec и runtime surface.
    - Тест явно подтверждает `31` модуль и `60` уникальных stat keys.
    - Нет missing keys и нет extra keys относительно frozen spec.
  - phase_id: F0
    task_id: F0-T2
    priority: P1
    title: Синхронизировать README / inventory / status / audit docs с реальным кодом
    why: 'Документация уже отстаёт: README всё ещё описывает runtime stat layer как очень ранний seed-safe slice, inventory
      помечает все 31 модуля как `inventory_only`, а код и frozen spec уже реализуют полную первую каноническую tranche.'
    files:
    - README.md
    - docs/STATUS_ASSESSMENT.md
    - docs/QUALITY_GATES.md
    - docs/stat_catalog/mbr_stats_inventory.yml
    - docs/check_mate_audit_2026-03-25_ru.md
    - docs/mbr_audit.md
    steps:
    - Выбрать один источник истины для текущего runtime status (`mbr_stats_spec_v1.yml`).
    - 'Обновить README: убрать формулировку про ''seed-only slice'', явно описать текущую первую canonical tranche и её блокеры.'
    - Либо обновить `status` в `mbr_stats_inventory.yml`, либо явно переименовать поле, чтобы оно не притворялось runtime-status.
    - Удалить или пометить как исторические все утверждения про отсутствие positions engine, action-legality engine и stage
      v2.
    acceptance:
    - Ни один документ больше не утверждает, что runtime stat layer — это только seed-safe slice, если в коде уже есть canonical
      60-key snapshot.
    - Inventory/status/spec больше не противоречат друг другу по текущему состоянию 31 модулей.
    - Старые аудиты либо удалены, либо явно помечены как historical/stale.
  - phase_id: F0
    task_id: F0-T3
    priority: P1
    title: Зафиксировать внешний upstream-срез MBR_Stats, если репозиторий станет доступен
    why: Текущий аудит пришлось делать по frozen spec внутри Check_Mate, потому что внешний `disikk/MBR_Stats` из этой среды
      не открылся. Для полной трассируемости нужен vendored snapshot или semantic diff.
    files:
    - docs/stat_catalog/upstream_mbr_stats_snapshot/
    - docs/stat_catalog/upstream_diff_report.md
    steps:
    - Если upstream снова доступен, сохранить snapshot исходного каталога в репозиторий или отдельный артефакт.
    - 'Построить явный diff: legacy formulas/outputs ↔ frozen `mbr_stats_spec_v1.yml`.'
    - Зафиксировать все осознанные rename/split/merge decisions.
    acceptance:
    - Есть воспроизводимый upstream snapshot или machine-readable diff report.
    - Каждый legacy stat-module имеет трассируемое соответствие frozen spec.
- phase_id: F1
  goal: Исправление KO-credit / KO-money semantics
  tasks:
  - phase_id: F1
    task_id: F1-T1
    priority: P0
    title: Пересобрать KO-credit semantics под официальное правило GG для side-pot кейсов
    why: 'Сейчас `build_elimination()` агрегирует все pot''ы, в которые внёсся busted player, и берёт winners по всем этим
      pot''ам. Официальное правило GG говорит иначе: если chips busted player есть в side pots, bounty делится только между
      winners последнего side pot.'
    files:
    - backend/crates/tracker_parser_core/src/normalizer.rs
    - backend/migrations/0010_hand_eliminations_ko_v2.sql
    - backend/crates/tracker_parser_core/src/models.rs
    - backend/crates/parser_worker/src/local_import.rs
    steps:
    - Ввести явное понятие `ko_credit_pot_no` (или эквивалентное поле) в `derived.hand_eliminations`.
    - 'Определять credit pot так: если busted player внёсся хотя бы в один side pot, использовать максимальный `pot_no`, содержащий
      его chips; иначе использовать main/единственный pot.'
    - Считать `hero_involved`, `hero_share_fraction`, `joint_ko`, `split_n`, `ko_involved_winners` только по credit pot, а
      не по union всех pot'ов.
    - Оставить `resolved_by_pot_nos` как диагностический след, но не как основание для KO-credit.
    - Сохранить reason-coded uncertainty для реально ambiguous winner mappings.
    acceptance:
    - Кейс 'Hero выиграл main pot, но проиграл последний side pot' больше не даёт Hero KO-credit.
    - Кейс split на последнем side pot делит KO-credit только между winners этого last side pot.
    - Поля `hero_involved`, `hero_share_fraction`, `joint_ko`, `is_sidepot_based` отражают именно KO-credit pot.
    - Committed pack и synthetic edge-pack не получают новых invariant errors.
  - phase_id: F1
    task_id: F1-T2
    priority: P0
    title: Переподключить все KO-derived stats к новой KO-credit модели и пересчитать goldens
    why: После исправления KO-credit потянутся downstream-изменения во всех event/money/adjusted/Big KO метриках.
    files:
    - backend/crates/mbr_stats_runtime/src/queries.rs
    - backend/crates/mbr_stats_runtime/src/big_ko.rs
    - backend/crates/mbr_stats_runtime/src/split_bounty.rs
    - backend/crates/mbr_stats_runtime/src/models.rs
    - backend/crates/mbr_stats_runtime/tests/
    steps:
    - 'Аудировать все SQL loaders, которые читают `derived.hand_eliminations`: `load_tournament_ko_event_facts`, `load_stage_event_facts`,
      `load_tournament_ko_money_event_facts`.'
    - Убедиться, что event metrics и money metrics используют одну и ту же новую KO-credit semantics, но не смешивают count
      и money logic.
    - Обновить формулы adjusted KO / ROI / Big KO только на supported exact Hero KO-credit events.
    - Пересчитать golden snapshots для committed fixtures и новых synthetic fixtures.
    acceptance:
    - Список затронутых ключей задокументирован и покрыт тестами.
    - Summary-only метрики (`roi_pct`, `itm_percent`, `winnings_from_*`, `ko_contribution_percent`) не меняются от KO-credit
      fix.
    - Все KO-derived metric changes проходят через осознанный golden diff review.
  - phase_id: F1
    task_id: F1-T3
    priority: P1
    title: Заменить heuristic KO-attempt query на formal exact attempt model
    why: Текущая логика attempt'ов (`all-in у target` + `shared pot eligibility` + `hero starting_stack >= target starting_stack`)
      недостаточна для claim'а `exact` и даёт риск false positives.
    files:
    - backend/crates/mbr_stats_runtime/src/queries.rs
    - backend/crates/tracker_parser_core/src/normalizer.rs
    - backend/migrations/*hand_ko_attempts*.sql
    - docs/stat_catalog/mbr_stats_spec_v1.yml
    steps:
    - Определить formal contract для exact KO attempt на уровне hand-target pair.
    - Материализовать `derived.hand_ko_attempts` или эквивалентный derived surface с reason-coded exact/uncertain states.
    - 'Исключить ложные попытки: hero folded, hero не live в KO-credit pot, hero не cover''ил relevant all-in contribution
      target''а.'
    - Если exactness доказать нельзя, downgrade exactness class attempt-based metrics или пометить их as estimated/provisional
      до доказательства.
    acceptance:
    - Кейс 'target jam, hero fold' не считается KO attempt.
    - Кейс 'shared eligibility without real KO contest' не считается KO attempt.
    - Каждая попытка трассируется до hand_id, target_seat_no и credit pot.
    - Attempt-based metrics больше не заявляют `exact`, если exactness не доказан формально.
- phase_id: F2
  goal: Stage/boundary/pre-FT hardening
  tasks:
  - phase_id: F2
    task_id: F2-T1
    priority: P0
    title: 'Исправить `pre_ft_chipev`: убрать synthetic zero fallback и починить denominator contract'
    why: Сейчас отсутствие pre-FT snapshot превращается в `COALESCE(hero_final_stack, 1000) - 1000`, что даёт искусственный
      0 chip delta и искажает среднее.
    files:
    - backend/crates/mbr_stats_runtime/src/queries.rs
    - backend/crates/parser_worker/src/local_import.rs
    - docs/stat_catalog/mbr_stats_spec_v1.yml
    - backend/crates/mbr_stats_runtime/tests/
    steps:
    - Убрать fallback `1000::bigint` из `load_pre_ft_chip_facts`.
    - В denominator включать только турниры с реальным exact pre-FT snapshot или с доказанным no-FT snapshot, а не просто
      helper-row.
    - При uncertain boundary исключать турнир из denominator, а не занулять.
    - При необходимости добавить explicit field `has_pre_ft_snapshot_exact` на helper/derived layer.
    acceptance:
    - '`pre_ft_chipev` не меняется из-за отсутствующего snapshot через искусственный 0.'
    - Турниры без exact pre-FT coverage исключаются из denominator.
    - 'Есть тесты на 4 кейса: exact boundary, uncertain boundary, no-FT with snapshot, no-FT without snapshot.'
  - phase_id: F2
    task_id: F2-T2
    priority: P1
    title: Перестать опираться на raw local timestamp strings как на primary ordering substrate
    why: Boundary, first FT hand, deep FT entry, stage-entry и pre-FT snapshot сейчас завязаны на сортировку строковых local
      timestamps + external hand id. Это хрупко и не даёт честного proof-level ordering outside committed scope.
    files:
    - backend/crates/parser_worker/src/local_import.rs
    - backend/crates/mbr_stats_runtime/src/queries.rs
    - backend/migrations/*hand_order*.sql
    - backend/crates/tracker_parser_core/src/models.rs
    steps:
    - 'Ввести стабильный ordering/provenance key для рук внутри турнира: source-member order, hand index in file, normalized
      parsed timestamp, optional cross-file tie class.'
    - Использовать этот key во всех stage/helper/stat queries вместо raw string sort.
    - Сохранять ambiguity, если несколько столов реально неупорядочиваемы, а не придумывать exact order.
    acceptance:
    - Нет stat-critical `ORDER BY hand_started_at_local` без явного stable order key.
    - Boundary/entry/pre-FT helpers используют deterministic ordering substrate.
    - Если порядок доказать нельзя, state остаётся `uncertain`, а не превращается в guessed exact.
  - phase_id: F2
    task_id: F2-T3
    priority: P1
    title: Вынести FT/stage detection в rulepack, а не держать по коду `max_players == 9`
    why: Для текущего GG MBR правило 9-player final table выглядит корректным, но жёсткое хардкодирование формата в нескольких
      местах сделает будущий drift или historical variants опасно невидимыми.
    files:
    - backend/crates/parser_worker/src/local_import.rs
    - backend/crates/mbr_stats_runtime/src/registry.rs
    - backend/crates/tracker_parser_core/src/models.rs
    - backend/seeds/0001_reference_data.sql
    steps:
    - Добавить room/rulepack abstraction для MBR stage semantics.
    - Сконцентрировать FT detection и stage predicates в одном месте.
    - 'Задать current GG rulepack: FT starts when 9 players remain; rush→shootout edge-cases описаны явно.'
    - Заменить прямые `max_players == 9` checks на rulepack calls.
    acceptance:
    - В stat-critical коде нет дублированных raw checks `max_players == 9`.
    - Current GG committed fixtures дают те же stage labels после refactor.
    - Historical/variant formats либо поддержаны, либо явно reason-coded as unsupported.
- phase_id: F3
  goal: Доказательство корректности через fixtures и goldens
  tasks:
  - phase_id: F3
    task_id: F3-T1
    priority: P1
    title: Расширить synthetic fixture suite на KO-credit, boundary и pre-FT edge cases
    why: Ключевые риски лежат именно в tricky semantic cases, которых может не быть в committed pack.
    files:
    - backend/crates/tracker_parser_core/tests/
    - backend/crates/parser_worker/src/local_import.rs
    - backend/crates/mbr_stats_runtime/tests/
    - backend/fixtures/synthetic/
    steps:
    - 'Добавить synthetic HH/TS cases: main-only split KO, last-sidepot KO, hero wins main not last sidepot, multiple busted
      players, same-timestamp boundary ambiguity, exact/no-FT pre-FT snapshot cases.'
    - Для каждого кейса зафиксировать expected `hand_eliminations`, stage helper rows и canonical stats deltas.
    - Сделать round-trip import tests до Postgres.
    acceptance:
    - Каждый P0/P1 edge case имеет свой fixture и regression test.
    - Synthetic suite проверяет и raw derived rows, и конечные canonical stats.
    - Новые tricky cases не остаются только на уровне unit tests без import round-trip.
  - phase_id: F3
    task_id: F3-T2
    priority: P1
    title: Добавить end-to-end golden tests для полного canonical snapshot (60 keys)
    why: Сейчас есть хорошие formula tests, но нет жёсткого интеграционного proof, что после import всё сходится на полном
      наборе stat keys.
    files:
    - backend/crates/mbr_stats_runtime/tests/canonical_snapshot_golden.rs
    - backend/crates/parser_worker/tests/
    - backend/scripts/run_backend_checks.sh
    steps:
    - Поднять test DB, импортировать committed fixtures + synthetic edge fixtures.
    - Вызвать `query_canonical_stats` и сохранить полный 60-key snapshot как golden output.
    - Проверять не только значения, но и nullability/zero-denominator behavior на selected scenarios.
    - Добавить diff-friendly golden review workflow.
    acceptance:
    - CI валит любые неожиданные изменения в canonical 60-key snapshot.
    - Golden tests покрывают committed pack и synthetic edge-pack.
    - Изменения goldens проходят явный review с объяснением причины.
  - phase_id: F3
    task_id: F3-T3
    priority: P1
    title: Прогнать extended real corpus и собрать uncertainty report
    why: Даже хорошие committed fixtures не доказывают корректность на реальном широком корпусе GG.
    files:
    - backend/scripts/
    - docs/runtime_uncertainty_report.md
    - docs/STATUS_ASSESSMENT.md
    steps:

spec_version: mbr_stats_spec_v1
frozen_on: 2026-03-25
scope:
  phase_id: F0
  task_ids:
    - F0-T1
    - F0-T2
  description: "Semantic freeze for MBR stats before boundary, stage, KO-money, and Big KO code changes."
dependency_order:
  - F0-T1
  - F0-T2
  - F1-T1
  - F1-T2
  - F1-T3
  - F2-T1
  - F2-T2
  - F3-T1
  - F3-T2
  - F4-T1
  - F4-T2
freeze_decisions:
  - "This file is the source of truth for stat semantics, denominator contracts, and exactness classes."
  - "Current runtime terms may remain as provisional implementation details; they are not canonical unless explicitly marked mapped."
  - "Event-count metrics and money metrics are separate families and must never share one output key."
  - "No F1+ code change may use `ft_stage_bucket` as a primary stage substrate."
  - "No F1+ code change may present `boundary_ko_*` as exact while `boundary_resolution_state` is non-exact."
  - "During F1-T3, runtime filters may read exact-core descriptors directly from `core/derived` tables, but this descriptor surface is a downstream substrate only and not yet a canonical public stat API."
downstream_exact_core_filter_surface:
  hand_presence_keys:
    - "has_uncertain_reason_code:<code> -> derived.hand_state_resolutions.uncertain_reason_codes"
    - "has_action_legality_issue:<code> -> derived.hand_state_resolutions.invariant_errors (legality subset)"
    - "has_invariant_error_code:<code> -> derived.hand_state_resolutions.invariant_errors"
  seat_surface:
    surface_key: seat
    note: "Runtime-only participant facet used by `mbr_stats_runtime::filters`; not a materialized analytics table and not a public stat key namespace."
    source_tables:
      - core.hand_positions
      - core.hand_actions
      - core.hand_summary_results
      - derived.hand_eliminations
    enum_keys:
      - position_code
      - summary_outcome_kind
      - summary_position_marker
      - summary_folded_street
      - summary_hand_class
    num_keys:
      - preflop_act_order_index
      - postflop_act_order_index
      - summary_won_amount
    bool_keys:
      - forced_all_in_preflop
      - summary_has_shown_cards
      - is_exact_ko_participant
      - is_exact_ko_eliminated
      - has_all_in_reason:<reason>
classification_legend:
  delivery_status:
    initial_tranche: "Part of the first honest stat tranche that should ship once its direct dependencies are implemented."
    blocked: "Spec is frozen, but implementation is blocked by missing helper layers or money semantics."
  runtime_status:
    mapped: "Current runtime already matches the frozen semantic contract closely enough."
    proxy: "Current runtime is useful but semantically narrower or named differently than the frozen contract."
    blocked: "No current runtime surface is honest enough to expose this metric."
    legacy_only: "Legacy output shape is retained only for compatibility notes and should not become the new canonical key."
  exactness_class:
    exact: "Value is provable directly from exact source-of-truth rows."
    coverage_limited_exact: "Formula is exact on the covered subset, but denominator is restricted by available source coverage."
    estimated: "Value comes from an explicitly inferred or posterior model."
    blocked: "Spec is frozen, but the value must not be emitted yet."
canonical_helper_terms:
  summary_covered_tournaments: "Tournaments with non-null buy-in, finish place, and payout fields from summary import."
  hh_covered_tournaments: "Tournaments with hand-history coverage sufficient to materialize exact per-hand features."
  reached_ft_exact: "Tournament-level FT helper says Hero reached an exact final-table hand."
  first_ft_hand_exact: "Tournament-level FT helper exposes one deterministic first FT hand."
  ft_started_incomplete: "First exact FT hand started with fewer than nine active players."
  hero_ft_entry_stack_chips: "Hero stack at the first exact FT hand."
  hero_ft_entry_stack_bb: "Hero FT-entry stack expressed in big blinds at the first exact FT hand."
  deepest_ft_size_reached: "Smallest exact FT player-count reached by Hero in the tournament."
  hero_exact_ko_event_count: "Count of exact KO events credited to Hero; event semantics only."
  ko_money_realized_total: "Money proven to come from KO rewards; money semantics only."
  ko_money_estimated_total: "Money inferred from posterior or estimated KO allocation."
  posterior_big_ko_bucket_weight: "Posterior expected count mass for a KO-money event in a multiplier bucket."
runtime_term_alignment:
  - runtime_term: roi_pct
    canonical_stat_keys:
      - roi_pct
    status: mapped
    note: "Current seed query already matches the frozen ROI formula over summary-covered tournaments."
  - runtime_term: avg_finish_place
    canonical_stat_keys:
      - avg_finish_place
    status: mapped
    note: "Current seed query already matches the frozen average finish formula over summary-covered tournaments."
  - runtime_term: final_table_reach_percent
    canonical_stat_keys:
      - final_table_reach_percent
    status: mapped
    note: "Current seed query already reads `derived.mbr_tournament_ft_helper.reached_ft_exact` over HH-covered tournaments."
  - runtime_term: hero_exact_ko_event_count
    canonical_stat_keys: []
    status: legacy_only
    note: "Retained only as a per-hand exact event counter. Public KO seed stats now read exact `derived.hand_eliminations` rows directly."
  - runtime_term: ft_stage_bucket
    canonical_stat_keys: []
    status: legacy_only
    note: "Allowed only as an auxiliary UI/debug bucket. All stage-aware stats must move to formal stage predicates from F1-T3."
  - runtime_term: boundary_ko_min
    canonical_stat_keys: []
    status: blocked
    note: "Current boundary v1 point estimate is not a valid uncertainty model."
  - runtime_term: boundary_ko_ev
    canonical_stat_keys: []
    status: blocked
    note: "Do not expose as a canonical stat until `boundary_resolution_state` and KO-money semantics are rebuilt."
  - runtime_term: boundary_ko_max
    canonical_stat_keys: []
    status: blocked
    note: "Do not expose as a canonical stat until `boundary_resolution_state` and KO-money semantics are rebuilt."
stat_modules:
  - legacy_module_id: avg_finish_place
    legacy_name: "Avg Finish Place"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - avg_finish_place
    formal_formula:
      avg_finish_place: "sum(finish_place) / count(summary_covered_tournaments)"
    numerator_definition:
      avg_finish_place: "Sum of Hero finish_place across tournaments in `summary_covered_tournaments`."
    denominator_definition:
      avg_finish_place: "Count of tournaments in `summary_covered_tournaments` with non-null finish_place."
    units:
      avg_finish_place: place
    grain: tournament_set
    exactness_class:
      avg_finish_place: coverage_limited_exact
    source_dependencies:
      - core.tournament_entries.finish_place
      - core.tournaments.buyin_total
      - core.tournament_entries.total_payout_money
    nullability_rules:
      avg_finish_place: "NULL when the denominator is 0."
    partial_coverage_behavior: "Use only `summary_covered_tournaments`. HH-only tournaments never join this denominator."
    fixture_expectations:
      - "Finish places [2, 5] produce 3.5."
      - "Tournament without finish_place is excluded from both numerator and denominator."

  - legacy_module_id: avg_finish_place_ft
    legacy_name: "Avg Finish Place FT"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - avg_finish_place_ft
    formal_formula:
      avg_finish_place_ft: "sum(finish_place where reached_ft_exact) / count(summary_covered_tournaments where reached_ft_exact)"
    numerator_definition:
      avg_finish_place_ft: "Sum of Hero finish_place across summary-covered tournaments where the tournament helper proves `reached_ft_exact = true`."
    denominator_definition:
      avg_finish_place_ft: "Count of summary-covered tournaments with `reached_ft_exact = true`."
    units:
      avg_finish_place_ft: place
    grain: tournament_set
    exactness_class:
      avg_finish_place_ft: coverage_limited_exact
    source_dependencies:
      - core.tournament_entries.finish_place
      - derived.mbr_tournament_ft_helper.reached_ft_exact
    nullability_rules:
      avg_finish_place_ft: "NULL when no tournament satisfies the denominator contract."
    partial_coverage_behavior: "Mapped query-time from the tournament-level FT helper. Only summary-covered tournaments with exact `reached_ft_exact = true` enter the denominator; never infer FT reach from `ft_stage_bucket`."
    fixture_expectations:
      - "Two FT-reached tournaments with finish places [1, 4] produce 2.5."
      - "Tournament with HH coverage but no exact FT helper record does not enter the denominator."

  - legacy_module_id: avg_finish_place_no_ft
    legacy_name: "Avg Finish Place No FT"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - avg_finish_place_no_ft
    formal_formula:
      avg_finish_place_no_ft: "sum(finish_place where reached_ft_exact = false) / count(summary_covered_tournaments where reached_ft_exact = false)"
    numerator_definition:
      avg_finish_place_no_ft: "Sum of Hero finish_place across summary-covered tournaments where the tournament helper proves `reached_ft_exact = false`."
    denominator_definition:
      avg_finish_place_no_ft: "Count of summary-covered tournaments where `reached_ft_exact = false`."
    units:
      avg_finish_place_no_ft: place
    grain: tournament_set
    exactness_class:
      avg_finish_place_no_ft: coverage_limited_exact
    source_dependencies:
      - core.tournament_entries.finish_place
      - derived.mbr_tournament_ft_helper.reached_ft_exact
    nullability_rules:
      avg_finish_place_no_ft: "NULL when no tournament satisfies the denominator contract."
    partial_coverage_behavior: "Mapped query-time from the tournament-level FT helper. Only summary-covered tournaments with exact `reached_ft_exact = false` enter the denominator."
    fixture_expectations:
      - "Two non-FT tournaments with finish places [13, 22] produce 17.5."
      - "Tournament with unknown FT status is excluded instead of guessed."

  - legacy_module_id: avg_ft_initial_stack
    legacy_name: "Avg FT Initial Stack"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - avg_ft_initial_stack_chips
      - avg_ft_initial_stack_bb
    formal_formula:
      avg_ft_initial_stack_chips: "sum(hero_ft_entry_stack_chips where first_ft_hand_exact) / count(tournaments where first_ft_hand_exact)"
      avg_ft_initial_stack_bb: "sum(hero_ft_entry_stack_bb where first_ft_hand_exact) / count(tournaments where first_ft_hand_exact)"
    numerator_definition:
      avg_ft_initial_stack_chips: "Sum of Hero chip stack on the first exact FT hand."
      avg_ft_initial_stack_bb: "Sum of Hero stack in big blinds on the first exact FT hand."
    denominator_definition:
      avg_ft_initial_stack_chips: "Count of tournaments with an exact `first_ft_hand_id` and exact Hero FT-entry stack."
      avg_ft_initial_stack_bb: "Count of tournaments with an exact `first_ft_hand_id` and exact Hero FT-entry stack."
    units:
      avg_ft_initial_stack_chips: chips
      avg_ft_initial_stack_bb: big_blinds
    grain: tournament_set
    exactness_class:
      avg_ft_initial_stack_chips: coverage_limited_exact
      avg_ft_initial_stack_bb: coverage_limited_exact
    source_dependencies:
      - derived.mbr_tournament_ft_helper.first_ft_hand_id
      - derived.mbr_tournament_ft_helper.hero_ft_entry_stack_chips
      - derived.mbr_tournament_ft_helper.hero_ft_entry_stack_bb
    nullability_rules:
      avg_ft_initial_stack_chips: "NULL when denominator is 0."
      avg_ft_initial_stack_bb: "NULL when denominator is 0."
    partial_coverage_behavior: "Mapped query-time from the FT helper once it exposes one deterministic first FT hand and exact Hero FT-entry stacks. Tournaments with only estimated FT boundary stay out of the denominator."
    fixture_expectations:
      - "Hero FT-entry stacks [18bb, 27bb] produce 22.5bb."
      - "Tournament with only estimated FT boundary never enters the denominator."

  - legacy_module_id: avg_ko_per_tournament
    legacy_name: "Avg KO Per Tournament"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - avg_ko_event_per_tournament
    formal_formula:
      avg_ko_event_per_tournament: "count(exact Hero KO events across hh_covered_tournaments) / count(hh_covered_tournaments)"
    numerator_definition:
      avg_ko_event_per_tournament: "Total number of exact `derived.hand_eliminations` rows where `hero_involved = true` and `certainty_state = exact` across `hh_covered_tournaments`."
    denominator_definition:
      avg_ko_event_per_tournament: "Count of tournaments in `hh_covered_tournaments`."
    units:
      avg_ko_event_per_tournament: ko_events_per_tournament
    grain: tournament_set
    exactness_class:
      avg_ko_event_per_tournament: coverage_limited_exact
    source_dependencies:
      - derived.hand_eliminations.hero_involved
      - derived.hand_eliminations.certainty_state
      - core.hands.tournament_id
    nullability_rules:
      avg_ko_event_per_tournament: "NULL when the denominator is 0."
    partial_coverage_behavior: "Use only HH-covered tournaments. Runtime now reads exact elimination rows directly, not per-hand proxy feature keys."
    fixture_expectations:
      - "Hero KO event totals [2, 1, 0] across three HH-covered tournaments produce 1.0."
      - "Split KO still counts as one KO event for each busted opponent."

  - legacy_module_id: big_ko
    legacy_name: "Big KO"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - big_ko_x1_5_count
      - big_ko_x2_count
      - big_ko_x10_count
      - big_ko_x100_count
      - big_ko_x1000_count
      - big_ko_x10000_count
    formal_formula:
      big_ko_x1_5_count: "sum(weighted_envelope_bucket_probability(event, x1.5))"
      big_ko_x2_count: "sum(weighted_envelope_bucket_probability(event, x2))"
      big_ko_x10_count: "sum(weighted_envelope_bucket_probability(event, x10))"
      big_ko_x100_count: "sum(weighted_envelope_bucket_probability(event, x100))"
      big_ko_x1000_count: "sum(weighted_envelope_bucket_probability(event, x1000))"
      big_ko_x10000_count: "sum(weighted_envelope_bucket_probability(event, x10000))"
    numerator_definition:
      big_ko_x1_5_count: "Frequency-weighted expected Hero KO-event mass in the x1.5 bucket using the official envelope table for the tournament buy-in."
      big_ko_x2_count: "Frequency-weighted expected Hero KO-event mass in the x2 bucket using the official envelope table for the tournament buy-in."
      big_ko_x10_count: "Frequency-weighted expected Hero KO-event mass in the x10 bucket using the official envelope table for the tournament buy-in."
      big_ko_x100_count: "Frequency-weighted expected Hero KO-event mass in the x100 bucket using the official envelope table for the tournament buy-in."
      big_ko_x1000_count: "Frequency-weighted expected Hero KO-event mass in the x1000 bucket using the official envelope table for the tournament buy-in."
      big_ko_x10000_count: "Frequency-weighted expected Hero KO-event mass in the x10000 bucket using the official envelope table for the tournament buy-in."
    denominator_definition:
      big_ko_x1_5_count: "Implicit denominator is the set of supported exact Hero KO-money events whose tournament buy-in maps to an official envelope table."
      big_ko_x2_count: "Implicit denominator is the set of supported exact Hero KO-money events whose tournament buy-in maps to an official envelope table."
      big_ko_x10_count: "Implicit denominator is the set of supported exact Hero KO-money events whose tournament buy-in maps to an official envelope table."
      big_ko_x100_count: "Implicit denominator is the set of supported exact Hero KO-money events whose tournament buy-in maps to an official envelope table."
      big_ko_x1000_count: "Implicit denominator is the set of supported exact Hero KO-money events whose tournament buy-in maps to an official envelope table."
      big_ko_x10000_count: "Implicit denominator is the set of supported exact Hero KO-money events whose tournament buy-in maps to an official envelope table."
    units:
      big_ko_x1_5_count: expected_event_count
      big_ko_x2_count: expected_event_count
      big_ko_x10_count: expected_event_count
      big_ko_x100_count: expected_event_count
      big_ko_x1000_count: expected_event_count
      big_ko_x10000_count: expected_event_count
    grain: ko_money_event_set
    exactness_class:
      big_ko_x1_5_count: estimated
      big_ko_x2_count: estimated
      big_ko_x10_count: estimated
      big_ko_x100_count: estimated
      big_ko_x1000_count: estimated
      big_ko_x10000_count: estimated
    source_dependencies:
      - core.tournaments.buyin_total
      - derived.hand_eliminations.hero_ko_share_total
      - derived.hand_eliminations.hero_share_fraction
      - ref.mbr_mystery_envelopes.frequency_per_100m
    nullability_rules:
      big_ko_x1_5_count: "0 when no supported exact Hero KO-money event exists."
      big_ko_x2_count: "0 when no supported exact Hero KO-money event exists."
      big_ko_x10_count: "0 when no supported exact Hero KO-money event exists."
      big_ko_x100_count: "0 when no supported exact Hero KO-money event exists."
      big_ko_x1000_count: "0 when no supported exact Hero KO-money event exists."
      big_ko_x10000_count: "0 when no supported exact Hero KO-money event exists."
    partial_coverage_behavior: "Mapped query-time using official envelope-frequency weighting over supported exact Hero KO-share events. No posterior conditioning and no greedy event-to-money allocation are allowed in this tranche."
    fixture_expectations:
      - "A supported exact Hero KO event contributes fractional expected mass across buckets according to the official envelope frequencies for that buy-in."
      - "Bucket counts remain expected counts, not forced integer allocations, when Hero only owns a partial KO-money share."

  - legacy_module_id: deep_ft_stat
    legacy_name: "Deep FT"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - deep_ft_reach_percent
      - deep_ft_avg_stack_chips
      - deep_ft_avg_stack_bb
      - deep_ft_roi_pct
    formal_formula:
      deep_ft_reach_percent: "count(tournaments where deepest_ft_size_reached <= 5) / count(hh_covered_tournaments)"
      deep_ft_avg_stack_chips: "sum(hero_stack_chips at first exact FT hand with players_remaining <= 5) / count(tournaments where deepest_ft_size_reached <= 5)"
      deep_ft_avg_stack_bb: "sum(hero_stack_bb at first exact FT hand with players_remaining <= 5) / count(tournaments where deepest_ft_size_reached <= 5)"
      deep_ft_roi_pct: "((sum(total_payout_money where deepest_ft_size_reached <= 5) - sum(buyin_total where deepest_ft_size_reached <= 5)) / sum(buyin_total where deepest_ft_size_reached <= 5)) * 100"
    numerator_definition:
      deep_ft_reach_percent: "Count of HH-covered tournaments where Hero reaches an exact FT state with five or fewer players remaining."
      deep_ft_avg_stack_chips: "Sum of Hero stack in chips on the first exact hand satisfying the deep-FT predicate."
      deep_ft_avg_stack_bb: "Sum of Hero stack in big blinds on the first exact hand satisfying the deep-FT predicate."
      deep_ft_roi_pct: "Net tournament profit over tournaments where Hero reaches deep FT."
    denominator_definition:
      deep_ft_reach_percent: "Count of HH-covered tournaments."
      deep_ft_avg_stack_chips: "Count of tournaments where Hero reaches deep FT exactly."
      deep_ft_avg_stack_bb: "Count of tournaments where Hero reaches deep FT exactly."
      deep_ft_roi_pct: "Sum of buy-ins for tournaments where Hero reaches deep FT exactly."
    units:
      deep_ft_reach_percent: percent
      deep_ft_avg_stack_chips: chips
      deep_ft_avg_stack_bb: big_blinds
      deep_ft_roi_pct: percent
    grain: tournament_set
    exactness_class:
      deep_ft_reach_percent: coverage_limited_exact
      deep_ft_avg_stack_chips: coverage_limited_exact
      deep_ft_avg_stack_bb: coverage_limited_exact
      deep_ft_roi_pct: coverage_limited_exact
    source_dependencies:
      - derived.mbr_tournament_ft_helper.deepest_ft_size_reached
      - derived.stage_predicates.is_stage_4_5
      - core.tournament_entries.total_payout_money
      - core.tournaments.buyin_total
    nullability_rules:
      deep_ft_reach_percent: "NULL when there are no HH-covered tournaments."
      deep_ft_avg_stack_chips: "NULL when no tournament reaches deep FT exactly."
      deep_ft_avg_stack_bb: "NULL when no tournament reaches deep FT exactly."
      deep_ft_roi_pct: "NULL when the buy-in denominator is 0."
    partial_coverage_behavior: "Mapped query-time from exact `deepest_ft_size_reached` plus exact deep-FT entry stacks. Tournaments with uncertain FT boundary or missing deep-FT entry stay out of the covered subset."
    fixture_expectations:
      - "Tournament that reaches 5-handed exactly increments deep_ft_reach_percent."
      - "Tournament stuck in uncertain boundary does not enter any deep-FT denominator."

  - legacy_module_id: early_ft_bust
    legacy_name: "Early FT Bust"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - early_ft_bust_count
      - early_ft_bust_per_tournament
    formal_formula:
      early_ft_bust_count: "count(hero bust events on hands where is_stage_6_9 = true)"
      early_ft_bust_per_tournament: "count(hero bust events on hands where is_stage_6_9 = true) / count(tournaments where reached_ft_exact)"
    numerator_definition:
      early_ft_bust_count: "Count of tournaments where Hero's elimination occurs on a hand with exact `is_stage_6_9 = true`."
      early_ft_bust_per_tournament: "Same count as `early_ft_bust_count`."
    denominator_definition:
      early_ft_bust_count: "Implicit denominator is the tournament set; this metric returns a count."
      early_ft_bust_per_tournament: "Count of tournaments with `reached_ft_exact = true`."
    units:
      early_ft_bust_count: bust_events
      early_ft_bust_per_tournament: bust_events_per_ft_tournament
    grain: tournament_set
    exactness_class:
      early_ft_bust_count: coverage_limited_exact
      early_ft_bust_per_tournament: coverage_limited_exact
    source_dependencies:
      - derived.stage_predicates.is_stage_6_9
      - derived.hand_eliminations
      - derived.mbr_tournament_ft_helper.reached_ft_exact
    nullability_rules:
      early_ft_bust_count: "0 when no exact early-FT bust exists."
      early_ft_bust_per_tournament: "NULL when no tournament reaches FT exactly."
    partial_coverage_behavior: "Mapped query-time from exact stage predicates and exact elimination timing. Only tournaments with exact FT reach enter the denominator for the per-tournament variant."
    fixture_expectations:
      - "Hero busting 7-handed increments early_ft_bust_count by 1."
      - "Hero busting 5-handed must not count as early FT."

  - legacy_module_id: early_ft_ko
    legacy_name: "Early FT KO"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - early_ft_ko_event_count
      - early_ft_ko_event_per_tournament
    formal_formula:
      early_ft_ko_event_count: "count(hero exact KO events on hands where is_stage_6_9 = true)"
      early_ft_ko_event_per_tournament: "count(hero exact KO events on hands where is_stage_6_9 = true) / count(tournaments where reached_ft_exact)"
    numerator_definition:
      early_ft_ko_event_count: "Count of Hero exact KO events during exact stage 6-9."
      early_ft_ko_event_per_tournament: "Same KO-event count as `early_ft_ko_event_count`."
    denominator_definition:
      early_ft_ko_event_count: "Implicit denominator is the tournament set; this metric returns a count."
      early_ft_ko_event_per_tournament: "Count of tournaments with `reached_ft_exact = true`."
    units:
      early_ft_ko_event_count: ko_events
      early_ft_ko_event_per_tournament: ko_events_per_ft_tournament
    grain: tournament_set
    exactness_class:
      early_ft_ko_event_count: coverage_limited_exact
      early_ft_ko_event_per_tournament: coverage_limited_exact
    source_dependencies:
      - derived.mbr_stage_resolution.is_stage_6_9
      - derived.hand_eliminations.hero_involved
      - derived.hand_eliminations.certainty_state
      - derived.mbr_tournament_ft_helper.reached_ft_exact
      - core.hands.tournament_id
    nullability_rules:
      early_ft_ko_event_count: "0 when no exact early-FT KO exists."
      early_ft_ko_event_per_tournament: "NULL when no tournament reaches FT exactly."
    partial_coverage_behavior: "Use only HH-covered tournaments. Numerator counts exact Hero KO events on hands where `is_stage_6_9 = true`; denominator counts tournaments where the helper proves `reached_ft_exact = true`."
    fixture_expectations:
      - "Hero KO at 8-handed increments the count."
      - "Hero KO at 5-handed belongs to stage 5-6 or 4-5, not early FT."

  - legacy_module_id: final_table_reach
    legacy_name: "Final Table Reach"
    delivery_status: initial_tranche
    current_runtime_status: mapped
    new_stat_keys:
      - final_table_reach_percent
    formal_formula:
      final_table_reach_percent: "count(tournaments where reached_ft_exact) / count(hh_covered_tournaments)"
    numerator_definition:
      final_table_reach_percent: "Count of HH-covered tournaments where the tournament helper proves `reached_ft_exact = true`."
    denominator_definition:
      final_table_reach_percent: "Count of HH-covered tournaments."
    units:
      final_table_reach_percent: percent
    grain: tournament_set
    exactness_class:

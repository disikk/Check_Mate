version: 2
title: MBR Stat Layer v2 Frozen Contract
summary: >
  Frozen semantic contract for the Check_Mate MBR stat layer after the v2 rewrite.
  The file intentionally stays compact: it freezes the canonical runtime key surface
  and the legacy-module-to-v2 mapping that spec parity tests enforce.

implementation_notes:
  - "KO attempts and KO opportunities are canonical parser-derived facts written into `derived.hand_ko_attempts` and `derived.hand_ko_opportunities`."
  - "Hand features `has_ko_attempt`, `has_ko_opportunity`, `hero_ko_attempt_count`, and `hero_ko_opportunity_count` are materialized only by aggregating those derived tables."
  - "`pre_ft_attempts`, whole-FT attempt pressure, and stage success/conversion cards must aggregate canonical attempt rows rather than re-derive confrontation logic at query time."

stat_modules:
  - legacy_module_id: avg_finish_place
    summary: TS-covered finish metric for all tournaments.
    new_stat_keys:
      - avg_finish_place

  - legacy_module_id: avg_finish_place_ft
    summary: TS-covered finish metric restricted to tournaments with exact FT reach.
    new_stat_keys:
      - avg_finish_place_ft

  - legacy_module_id: avg_finish_place_no_ft
    summary: TS-covered finish metric restricted to tournaments without exact FT reach.
    new_stat_keys:
      - avg_finish_place_no_ft

  - legacy_module_id: avg_ft_initial_stack
    summary: Exact FT-entry stack averages in chips and big blinds.
    new_stat_keys:
      - avg_ft_initial_stack_chips
      - avg_ft_initial_stack_bb

  - legacy_module_id: avg_ko_per_tournament
    summary: Share-based total KO average over HH-covered tournaments.
    new_stat_keys:
      - avg_ko_per_tournament

  - legacy_module_id: big_ko
    summary: Posterior-weighted big-KO tier counts using exact tournament mystery totals and Hero KO shares.
    new_stat_keys:
      - big_ko_x1_5_count
      - big_ko_x2_count
      - big_ko_x10_count
      - big_ko_x100_count
      - big_ko_x1000_count
      - big_ko_x10000_count

  - legacy_module_id: deep_ft_stat
    summary: Deep-FT reach, stack, and ROI metrics for exact stage <= 5.
    new_stat_keys:
      - deep_ft_reach_percent
      - deep_ft_avg_stack_chips
      - deep_ft_avg_stack_bb
      - deep_ft_roi_pct

  - legacy_module_id: early_ft_bust
    summary: Exact-result early FT bust metrics for finish places 6..9.
    new_stat_keys:
      - early_ft_bust_count
      - early_ft_bust_per_tournament

  - legacy_module_id: early_ft_ko
    summary: Share-based exact FT KO metrics on stage 6..9 only.
    new_stat_keys:
      - early_ft_ko
      - early_ft_ko_per_tournament

  - legacy_module_id: final_table_reach
    summary: FT reach rate over HH-covered tournaments.
    new_stat_keys:
      - final_table_reach_percent

  - legacy_module_id: ft_stack_conversion
    summary: Whole-FT stack conversion using exact FT KO share and FT-entry stack share.
    new_stat_keys:
      - ft_stack_conversion

  - legacy_module_id: ft_stack_conversion_attempts
    summary: Whole-FT attempt pressure and success metrics; legacy composite score removed.
    new_stat_keys:
      - avg_ko_attempts_per_ft
      - ft_ko_success_rate

  - legacy_module_id: ft_stack_conversion_stage
    summary: Stage conversion, attempts, and success metrics for 7-9, 5-6, and 3-4.
    new_stat_keys:
      - ft_stack_conversion_7_9
      - ko_attempts_per_ft_7_9
      - ko_success_rate_7_9
      - ft_stack_conversion_5_6
      - ko_attempts_per_ft_5_6
      - ko_success_rate_5_6
      - ft_stack_conversion_3_4
      - ko_attempts_per_ft_3_4
      - ko_success_rate_3_4

  - legacy_module_id: incomplete_ft_percent
    summary: Share of FT starts that begin short-handed.
    new_stat_keys:
      - incomplete_ft_percent

  - legacy_module_id: itm
    summary: TS-covered ITM percentage for top-3 regular prizes.
    new_stat_keys:
      - itm_percent

  - legacy_module_id: ko_contribution
    summary: Actual and adjusted KO-money contribution shares.
    new_stat_keys:
      - ko_contribution
      - ko_contribution_adj

  - legacy_module_id: ko_luck
    summary: KO-money luck delta versus expected envelope value.
    new_stat_keys:
      - ko_luck

  - legacy_module_id: ko_stage_2_3
    summary: Exact FT KO-share total and expected KO-money total for stage 2-3.
    new_stat_keys:
      - ko_stage_2_3
      - ko_stage_2_3_money_total

  - legacy_module_id: ko_stage_3_4
    summary: Exact FT KO-share total and expected KO-money total for stage 3-4.
    new_stat_keys:
      - ko_stage_3_4
      - ko_stage_3_4_money_total

  - legacy_module_id: ko_stage_4_5
    summary: Exact FT KO-share total and expected KO-money total for stage 4-5.
    new_stat_keys:
      - ko_stage_4_5
      - ko_stage_4_5_money_total

  - legacy_module_id: ko_stage_5_6
    summary: Exact FT KO-share total and expected KO-money total for stage 5-6.
    new_stat_keys:
      - ko_stage_5_6
      - ko_stage_5_6_money_total

  - legacy_module_id: ko_stage_6_9
    summary: Exact FT KO-share total and expected KO-money total for stage 6-9.
    new_stat_keys:
      - ko_stage_6_9
      - ko_stage_6_9_money_total

  - legacy_module_id: ko_stage_7_9
    summary: Exact FT KO-share total and expected KO-money total for stage 7-9.
    new_stat_keys:
      - ko_stage_7_9
      - ko_stage_7_9_money_total

  - legacy_module_id: pre_ft_chipev
    summary: Renamed legacy rush-stage chip output metric.
    new_stat_keys:
      - pre_ft_chips

  - legacy_module_id: pre_ft_ko
    summary: Transition-hand-only weighted pre-FT KO and attempt metrics.
    new_stat_keys:
      - pre_ft_ko
      - pre_ft_attempts

  - legacy_module_id: roi
    summary: Base TS-covered ROI metric.
    new_stat_keys:
      - roi_pct

  - legacy_module_id: roi_adj
    summary: ROI with KO-luck removed through expected KO money.
    new_stat_keys:
      - roi_adj

  - legacy_module_id: roi_on_ft
    summary: TS-covered ROI restricted to exact FT-reached tournaments.
    new_stat_keys:
      - roi_on_ft_pct

  - legacy_module_id: total_ko
    summary: Share-based total KO surface, including transition-weighted pre-FT KO.
    new_stat_keys:
      - total_ko

  - legacy_module_id: winnings_from_itm_stat
    summary: Regular-prize money total from TS-covered tournaments.
    new_stat_keys:
      - winnings_from_itm

  - legacy_module_id: winnings_from_ko_stat
    summary: KO-derived payout money total from TS-covered tournaments.
    new_stat_keys:
      - winnings_from_ko
